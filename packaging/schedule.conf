# ---------------------------------------------------------------------------
# system-diagnostics schedule configuration
# ---------------------------------------------------------------------------
# Hours (0-23, 24-hour clock) at which the diagnostic run is triggered.
# Specify multiple hours as a comma-separated list.
# If this file is absent or this property is missing/invalid, the built-in
# defaults (0, 9, 15, 18) are used automatically.
#
# Examples:
#   scheduled.hours=0,9,15,18        <- default (midnight, 09:00, 15:00, 18:00)
#   scheduled.hours=6,12,18          <- three times a day
#   scheduled.hours=0                <- once a day at midnight
# ---------------------------------------------------------------------------
scheduled.hours=0,9,15,18
